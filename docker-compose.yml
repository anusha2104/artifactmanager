version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: artifactdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: artifactdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432

volumes:
  postgres_data: